# 模板文件 — 复制为 secrets.yaml 并填入真实 PIN Code
# 此文件可安全提交到 git（仅含占位符）

pin_codes:
  - level: 1
    entries:
      - pin: "<PIN_CODE_HERE>"
        platforms: ["<PLATFORM_1>", "<PLATFORM_2>"]

  - level: 5
    entries:
      - pin: "<PIN_CODE_HERE>"
        platforms: ["<PLATFORM_1>"]
      - pin: "<PIN_CODE_HERE>"
        platforms: ["<PLATFORM_2>"]
        serial_version: 2.0

  - level: 19
    entries:
      - pin: "<PIN_CODE_HERE>"
        platforms: ["<PLATFORM_1>"]